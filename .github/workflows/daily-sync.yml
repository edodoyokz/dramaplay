name: Daily Provider Sync

on:
  schedule:
    # 3 AM WIB = 20:00 UTC
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        provider:
          - dramanova
          - netshort
          - pinedrama
          - dramaboxbaru
          - dramawave
          - melolo
          - reelshort
          - shortmax
          - goodshort

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync ${{ matrix.provider }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PROVIDER_BASE_URL: ${{ secrets.PROVIDER_BASE_URL }}
          PROVIDER_API_TOKEN: ${{ secrets.PROVIDER_API_TOKEN }}
        run: |
          set -e
          cd apps/api
          pnpm exec tsx scripts/sync-providers.ts ${{ matrix.provider }}
