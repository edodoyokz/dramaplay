name = "dramaplay-api"
compatibility_date = "2026-06-22"
compatibility_flags = ["nodejs_compat"]
main = "src/index.ts"

[vars]
ENVIRONMENT = "production"

[[routes]]
pattern = "api.dramaplay.my.id/*"
zone_name = "dramaplay.my.id"

# ponytail: cron disabled until Cloudflare creates the account workers.dev subdomain.
# Open Workers in the dashboard once, then uncomment to enable:
#   - keep-alive ping (anti-pause) + analytics_events 7-day purge (see scheduled() in src/index.ts)
#   - provider sync
# [triggers]
# crons = ["*/30 * * * *", "0 */2 * * *"]
