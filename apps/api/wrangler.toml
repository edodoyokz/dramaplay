name = "dramaplay-api"
compatibility_date = "2026-06-22"
compatibility_flags = ["nodejs_compat"]
main = "src/index.ts"

[vars]
ENVIRONMENT = "production"
CONSUMER_URL = "https://dramaplay.my.id"
SAPIMU_PROVIDER_ENGINE = "v2"

[[routes]]
pattern = "api.dramaplay.my.id/*"
zone_name = "dramaplay.my.id"

[triggers]
crons = ["*/15 * * * *"]
